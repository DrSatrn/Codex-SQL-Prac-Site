<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Practice Lab</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.7/require.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="top-bar__group">
          <label for="engine-select">Engine</label>
          <select id="engine-select"></select>
        </div>
        <div class="top-bar__group">
          <label for="dataset-select">Dataset</label>
          <select id="dataset-select"></select>
        </div>
        <div class="top-bar__group top-bar__group--grow">
          <label for="row-limit">Row Limit</label>
          <input id="row-limit" type="number" min="1" max="5000" value="200" />
        </div>
        <button id="run-query" class="btn btn--primary">Execute (Cmd/Ctrl + Enter)</button>
        <button id="lint-query" class="btn">Lint</button>
        <button id="clear-history" class="btn">Clear Session History</button>
      </header>

      <main class="main-grid">
        <section class="editor-panel panel">
          <div class="panel__title">Query Editor</div>
          <div id="editor"></div>
        </section>

        <aside class="history-panel panel">
          <div class="panel__title">Session History</div>
          <div id="history-list" class="history-list"></div>
        </aside>

        <section class="diagnostics-panel panel">
          <div class="panel__title">Messages</div>
          <div id="diagnostics" class="diagnostics"></div>
        </section>

        <section class="metrics-panel panel">
          <div class="panel__title">Performance</div>
          <div id="metrics" class="metrics"></div>
        </section>

        <section class="results-panel panel">
          <div class="panel__title">Results</div>
          <div id="result-meta" class="result-meta"></div>
          <div class="result-table-wrap">
            <table id="results-table" class="results-table"></table>
          </div>
          <pre id="explain-output" class="explain-output"></pre>
        </section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
